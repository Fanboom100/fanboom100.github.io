<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>班级课程表 · 金色组合框</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif;
        }
        body {
            background: #f7f3eb;
            margin: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1400px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            padding: 20px 20px 16px;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 14px 20px;
            align-items: center;
            margin-bottom: 20px;
            background: #fefcf6;
            padding: 16px 20px;
            border-radius: 60px;
            border: 1px solid #f0e5d2;
        }
        /* 组合框容器 */
        .combo-box {
            position: relative;
            flex: 1 1 260px;
            min-width: 220px;
        }
        .combo-box input {
            width: 100%;
            padding: 12px 52px 12px 22px;
            border-radius: 50px;
            border: 1.5px solid #d4af37;
            background: white;
            font-size: 1rem;
            outline: none;
            transition: 0.15s;
        }
        .combo-box input:focus {
            border-color: #b8860b;
            box-shadow: 0 0 0 3px rgba(212,175,55,0.2);
        }
        .combo-btn {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #d4af37;
            border: none;
            color: white;
            font-size: 1.6rem;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .combo-btn:hover {
            background: #b8860b;
        }
        .combo-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #d4af37;
            border-radius: 24px;
            max-height: 260px;
            overflow-y: auto;
            z-index: 20;
            padding: 10px 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: none;
        }
        .combo-dropdown li {
            padding: 12px 22px;
            list-style: none;
            cursor: pointer;
            color: #2c1e0e;
            border-bottom: 1px solid #f5efd9;
            transition: background 0.1s;
            font-size: 1rem;
        }
        .combo-dropdown li:last-child {
            border-bottom: none;
        }
        .combo-dropdown li:hover {
            background: #fcf3e1;
        }
        .combo-dropdown .selected {
            background: #ecdbbd;
            font-weight: 500;
            color: #1e3a6f;
        }
        .status {
            margin-left: auto;
            color: #8b6f3c;
            font-size: 0.9rem;
            background: #f8f0dd;
            padding: 6px 20px;
            border-radius: 40px;
            white-space: nowrap;
        }
        /* 中央周控制器 */
        .week-control-center {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 10px 0 18px 0;
        }
        .week-nav-btn {
            background: #d4af37;
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.8rem;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .week-nav-btn:hover {
            background: #b8860b;
        }
        .week-display-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fefaf2;
            padding: 6px 18px 6px 22px;
            border-radius: 60px;
            border: 1px solid #ecdbbd;
        }
        .week-display-box span {
            font-size: 1.6rem;
            font-weight: 600;
            color: #2c1e0e;
        }
        .week-display-box input {
            width: 85px;
            text-align: center;
            font-size: 1.6rem;
            font-weight: 600;
            border: 1px solid #d4af37;
            border-radius: 40px;
            padding: 6px 0;
            color: #1e3a6f;
            background: white;
            outline: none;
        }
        .week-display-box input:focus {
            border-color: #b8860b;
            box-shadow: 0 0 0 3px rgba(212,175,55,0.25);
        }
        /* 表格滚动 */
        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 10px 0 0;
            border-radius: 20px;
            border: 1px solid #eeddc5;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            min-width: 680px;
        }
        th {
            background: #fcf3e1;
            color: #4f3a1e;
            font-weight: 600;
            font-size: 1rem;
            padding: 14px 4px;
            border: 1px solid #eed2b1;
        }
        td {
            border: 1px solid #eed2b1;
            vertical-align: top;
            padding: 8px;
            height: 140px;
            background-color: #fffdf8;
        }
        .time-col {
            background: #fcf3e1;
            font-weight: 600;
            color: #4f3a1e;
            width: 80px;
            text-align: center;
            vertical-align: middle;
            font-size: 1rem;
            border-right: 2px solid #d4af37;
        }
        .course-item {
            background: #fffdf5;
            border: 1px solid #f5efd9;
            border-radius: 14px;
            padding: 12px 10px;
            margin-bottom: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }
        .course-item:last-child {
            margin-bottom: 0;
        }
        .course-name {
            font-weight: 700;
            color: #2c1e0e;
            font-size: 1rem;
            margin-bottom: 8px;
            border-bottom: 1px dashed #e9d7b5;
            padding-bottom: 4px;
        }
        .course-detail {
            color: #5f4c2e;
            font-size: 0.88rem;
            line-height: 1.6;
            padding-left: 6px;
            display: flex;
            align-items: baseline;
            gap: 5px;
        }
        .course-detail::before {
            content: "•";
            color: #b8860b;
            font-weight: bold;
            font-size: 1.2rem;
            margin-right: 4px;
        }
        .empty-cell {
            color: #ccb690;
            font-style: italic;
            text-align: center;
            padding-top: 24px;
            font-size: 0.9rem;
        }
        footer {
            height: 10px;
        }
        @media (max-width: 600px) {
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .status {
                margin-left: 0;
                text-align: center;
            }
        }
        /* 隐藏旧无关节点的样式 */
        #dateHint, .footer-old {
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="toolbar">
        <!-- 新的组合框：输入框 + 金色圆形下拉按钮 -->
        <div class="combo-box" id="classComboContainer">
            <input type="text" id="classComboInput" placeholder="班级" autocomplete="off" value="">
            <button class="combo-btn" id="comboToggleBtn">▼</button>
            <ul class="combo-dropdown" id="comboDropdown"></ul>
        </div>
        <div class="status" id="status">正在加载数据...</div>
    </div>

    <!-- 周选择器：允许完全删除数字 -->
    <div class="week-control-center">
        <button class="week-nav-btn" id="prevWeekBtn">←</button>
        <div class="week-display-box">
            <span>第</span>
            <input type="text" id="weekDisplayInput" value="3" inputmode="numeric" pattern="\d*">
            <span>周</span>
        </div>
        <button class="week-nav-btn" id="nextWeekBtn">→</button>
    </div>

    <div class="table-wrapper">
        <table id="timetable">
            <thead>
            <tr id="weekHeaders">
                <th>节次 / 星期</th>
                <th>周一</th>
                <th>周二</th>
                <th>周三</th>
                <th>周四</th>
                <th>周五</th>
                <th>周六</th>
                <th>周日</th>
            </tr>
            </thead>
            <tbody id="timetableBody">
            <tr><td colspan="8" style="text-align:center; padding:40px;">⏳ 加载数据...</td></tr>
            </tbody>
        </table>
    </div>
    <footer></footer>
</div>

<script>
    (function() {
        // ---------- 数据存储 ----------
        let coursesData = [];
        let scheduleData = [];
        let courseNameMap = new Map();
        let allClasses = [];               // 所有班级列表（去重排序）
        let selectedClass = '';            // 当前选中的班级

        // ---------- DOM 元素 ----------
        const statusDiv = document.getElementById('status');
        const weekDisplayInput = document.getElementById('weekDisplayInput');
        const prevWeekBtn = document.getElementById('prevWeekBtn');
        const nextWeekBtn = document.getElementById('nextWeekBtn');
        const tbody = document.getElementById('timetableBody');
        const weekHeaders = document.getElementById('weekHeaders');

        // 组合框相关
        const comboInput = document.getElementById('classComboInput');
        const comboBtn = document.getElementById('comboToggleBtn');
        const comboDropdown = document.getElementById('comboDropdown');

        // 节次定义
        const SESSIONS = [
            { name: "1-2", start: 1, end: 2, time: "8:00 - 9:40" },
            { name: "3-4", start: 3, end: 4, time: "10:00 - 11:40" },
            { name: "5-6", start: 5, end: 6, time: "14:00 - 15:40" },
            { name: "7-8", start: 7, end: 8, time: "16:00 - 17:40" },
            { name: "10-11", start: 10, end: 11, time: "19:20 - 21:00" }
        ];
        const WEEKDAYS = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];

        // ---------- 通用函数 ----------
        function updateStatus(msg, isError = false) {
            statusDiv.textContent = msg;
            statusDiv.style.background = isError ? '#ffe6d5' : '#f8f0dd';
            statusDiv.style.color = isError ? '#a1451a' : '#8b6f3c';
        }

        // 从courses提取班级列表 (去重排序)
        function extractClasses() {
            const classSet = new Set();
            coursesData.forEach(item => {
                if (item.class && typeof item.class === 'string') {
                    const cls = item.class.trim();
                    if (cls) classSet.add(cls);
                }
            });
            return Array.from(classSet).sort((a, b) => a.localeCompare(b, 'zh'));
        }

        // 构建课程名映射
        function buildCourseNameMap() {
            courseNameMap.clear();
            coursesData.forEach(item => {
                if (item.lessonid && item.name) {
                    courseNameMap.set(String(item.lessonid), item.name);
                }
            });
        }

        // 周有效判断
        function isValidForWeek(scheduleItem, weekNum) {
            if (!scheduleItem.vaildWeeks) return false;
            const weeksStr = String(scheduleItem.vaildWeeks);
            if (weeksStr.length < weekNum) return false;
            return weeksStr.charAt(weekNum - 1) === '1';
        }

        function coversSessionBlock(schedule, blockStart, blockEnd) {
            const s = schedule.startSession;
            const e = schedule.endSession;
            return !(e < blockStart || s > blockEnd);
        }

        // 构建grid数据
        function buildTimetableData(className, weekNum) {
            const grid = Array.from({ length: 7 }, () => Array.from({ length: SESSIONS.length }, () => []));

            const courseIdsInClass = new Set();
            coursesData.forEach(c => {
                if (c.class && c.class.trim() === className && c.lessonid) {
                    courseIdsInClass.add(String(c.lessonid));
                }
            });

            scheduleData.forEach((sch) => {
                const courseId = String(sch.courseId);
                if (!courseIdsInClass.has(courseId)) return;
                if (!isValidForWeek(sch, weekNum)) return;

                const weekday = sch.weekday;
                if (weekday < 1 || weekday > 7) return;

                const courseName = courseNameMap.get(courseId) || '未知课程';
                const teacher = sch.teacherName || '';
                const room = sch.roomName || '';

                const courseInfo = { name: courseName, teacher, room };

                for (let sIdx = 0; sIdx < SESSIONS.length; sIdx++) {
                    const block = SESSIONS[sIdx];
                    if (coversSessionBlock(sch, block.start, block.end)) {
                        grid[weekday - 1][sIdx].push(courseInfo);
                    }
                }
            });
            return grid;
        }

        // 渲染课表
        function renderTimetable(className, weekNum) {
            if (!className || allClasses.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:40px;">请选择一个班级</td></tr>';
                return;
            }

            const grid = buildTimetableData(className, weekNum);

            // 更新表头日期
            const baseDate = new Date(2026, 2, 2);
            const monday = new Date(baseDate);
            monday.setDate(baseDate.getDate() + (weekNum - 1) * 7);
            const dates = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date(monday);
                d.setDate(monday.getDate() + i);
                const month = (d.getMonth() + 1).toString().padStart(2, '0');
                const day = d.getDate().toString().padStart(2, '0');
                dates.push(`${month}.${day}`);
            }
            const headers = document.querySelectorAll('#weekHeaders th');
            for (let i = 1; i <= 7; i++) {
                if (headers[i]) {
                    headers[i].innerHTML = `${WEEKDAYS[i - 1]}<br><span style="font-size:0.75rem; font-weight:normal; color:#7c613a;">${dates[i - 1]}</span>`;
                }
            }

            // 生成表格体
            let html = '';
            for (let row = 0; row < SESSIONS.length; row++) {
                const session = SESSIONS[row];
                html += '<tr>';
                html += `<td class="time-col">${session.name}<br><span style="font-size:0.75rem;">${session.time}</span></td>`;

                for (let day = 0; day < 7; day++) {
                    const courses = grid[day][row];
                    html += '<td>';
                    if (courses.length === 0) {
                        html += '<div class="empty-cell">—</div>';
                    } else {
                        courses.forEach(c => {
                            let details = '';
                            if (c.room) details += `<div class="course-detail">教室：${c.room}</div>`;
                            if (c.teacher) details += `<div class="course-detail">教师：${c.teacher}</div>`;
                            if (!c.room && !c.teacher) details += `<div class="course-detail">无教室/教师信息</div>`;

                            html += `<div class="course-item">`;
                            html += `<div class="course-name">${c.name}</div>`;
                            html += details;
                            html += `</div>`;
                        });
                    }
                    html += '</td>';
                }
                html += '</tr>';
            }
            tbody.innerHTML = html;
        }

        // 刷新课表 (基于selectedClass和当前周)
        function refreshTimetable() {
            if (!selectedClass || allClasses.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:40px;">请选择班级</td></tr>';
                return;
            }
            let weekNum = parseInt(weekDisplayInput.value, 10);
            if (isNaN(weekNum) || weekNum < 1) weekNum = 1;
            if (weekNum > 26) weekNum = 26;
            weekDisplayInput.value = weekNum;  // 确保显示有效数字
            renderTimetable(selectedClass, weekNum);
        }

        // ---------- 组合框逻辑 ----------
        // 渲染下拉列表 (根据过滤文本)
        function renderDropdown(filterText = '') {
            if (!allClasses.length) {
                comboDropdown.innerHTML = '<li style="color:#999; cursor:default;">无班级数据</li>';
                return;
            }
            const lowerFilter = filterText.toLowerCase();
            const filtered = allClasses.filter(cls => cls.toLowerCase().includes(lowerFilter));
            if (filtered.length === 0) {
                comboDropdown.innerHTML = '<li style="color:#999; cursor:default;">无匹配班级</li>';
                return;
            }
            let html = '';
            filtered.forEach(cls => {
                const selectedClassAttr = (cls === selectedClass) ? 'selected' : '';
                html += `<li class="${selectedClassAttr}" data-class="${cls}">${cls}</li>`;
            });
            comboDropdown.innerHTML = html;

            // 为所有li绑定点击事件
            Array.from(comboDropdown.querySelectorAll('li[data-class]')).forEach(li => {
                li.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const cls = li.dataset.class;
                    if (cls) {
                        selectedClass = cls;
                        comboInput.value = cls;
                        hideDropdown();
                        refreshTimetable();
                    }
                });
            });
        }

        function showDropdown() {
            if (!allClasses.length) return;
            renderDropdown(comboInput.value);
            comboDropdown.style.display = 'block';
        }

        function hideDropdown() {
            comboDropdown.style.display = 'none';
        }

        function toggleDropdown() {
            if (comboDropdown.style.display === 'block') {
                hideDropdown();
            } else {
                showDropdown();
            }
        }

        // 点击外部关闭下拉
        document.addEventListener('click', (e) => {
            if (!document.getElementById('classComboContainer').contains(e.target)) {
                hideDropdown();
            }
        });

        // 输入框事件：实时过滤 + 显示下拉
        comboInput.addEventListener('input', function() {
            if (!allClasses.length) return;
            // 当下拉隐藏时，输入时自动显示下拉
            if (comboDropdown.style.display !== 'block') {
                showDropdown();
            } else {
                renderDropdown(this.value);
            }
        });

        // 输入框获得焦点时，如果下拉隐藏，可考虑显示（但避免遮盖，由用户点击触发更自然）
        comboInput.addEventListener('focus', function() {
            // 如果下拉没显示，可以显示，但不要干扰用户手动输入
            if (comboDropdown.style.display !== 'block' && allClasses.length > 0) {
                showDropdown();
            }
        });

        // 按钮点击切换
        comboBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleDropdown();
        });

        // 防止下拉内部点击冒泡导致立即关闭
        comboDropdown.addEventListener('click', (e) => e.stopPropagation());

        // 初始化组合框 (在数据加载后调用)
        function initCombo() {
            if (allClasses.length > 0) {
                selectedClass = allClasses[0];          // 默认第一个
                comboInput.value = selectedClass;
                renderDropdown('');
                refreshTimetable();
            } else {
                comboInput.value = '';
                selectedClass = '';
                comboDropdown.innerHTML = '<li style="color:#999;">无班级</li>';
            }
        }

        // ---------- 周输入框 (允许完全删除数字) ----------
        // 限制只能输入数字
        weekDisplayInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^\d]/g, '');
            // 不自动刷新，等blur或箭头
        });

        weekDisplayInput.addEventListener('blur', function() {
            let val = parseInt(this.value, 10);
            if (isNaN(val) || val < 1) val = 1;
            if (val > 26) val = 26;
            this.value = val;
            refreshTimetable();   // 周有效后刷新
        });

        // 左右箭头
        function changeWeek(delta) {
            let current = parseInt(weekDisplayInput.value, 10);
            if (isNaN(current)) current = 1;
            let newWeek = current + delta;
            if (newWeek < 1) newWeek = 1;
            if (newWeek > 26) newWeek = 26;
            weekDisplayInput.value = newWeek;
            refreshTimetable();
        }

        prevWeekBtn.addEventListener('click', () => changeWeek(-1));
        nextWeekBtn.addEventListener('click', () => changeWeek(1));

        // 允许回车触发刷新(可选)
        weekDisplayInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                weekDisplayInput.blur();
            }
        });

        // ---------- 加载两个JSON ----------
        async function loadAllFiles() {
            updateStatus('正在加载课程信息...');
            try {
                const [coursesResp, scheduleResp] = await Promise.all([
                    fetch('lessons.json'),
                    fetch('schedules.json')
                ]);

                if (!coursesResp.ok) throw new Error(`课程文件加载失败: ${coursesResp.status}`);
                if (!scheduleResp.ok) throw new Error(`排课文件加载失败: ${scheduleResp.status}`);

                const coursesJson = await coursesResp.json();
                const scheduleJson = await scheduleResp.json();

                coursesData = Array.isArray(coursesJson) ? coursesJson : [];
                if (coursesData.length === 0) throw new Error('课程信息为空数组');

                scheduleData = Array.isArray(scheduleJson) ? scheduleJson : [];
                if (scheduleData.length === 0) throw new Error('排课信息为空数组');

                buildCourseNameMap();
                updateStatus(`✅ 课程 ${coursesData.length} 条 · 排课 ${scheduleData.length} 条`);

                // 提取班级列表并初始化组合框
                allClasses = extractClasses();
                initCombo();   // 设置selectedClass和input，刷新课表

            } catch (err) {
                updateStatus(`❌ 加载失败: ${err.message}`, true);
                console.error(err);
                comboInput.value = '加载失败';
                comboInput.disabled = true;
                comboBtn.disabled = true;
                comboDropdown.innerHTML = '';
            }
        }

        // 初始表头占位
        const initHeaders = document.querySelectorAll('#weekHeaders th');
        for (let i = 1; i <= 7; i++) {
            if (initHeaders[i]) initHeaders[i].innerHTML = WEEKDAYS[i-1];
        }

        // 启动
        loadAllFiles();
    })();
</script>
</body>
</html>
