<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>班级课程表</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif;
        }
        body {
            background: #f7f3eb;
            margin: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1400px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            padding: 20px 20px 16px;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 16px;
            align-items: center;
            margin-bottom: 20px;
            background: #fefcf6;
            padding: 14px 18px;
            border-radius: 40px;
            border: 1px solid #f0e5d2;
        }
        .combo-box {
            position: relative;
            flex: 1 1 240px;
            min-width: 200px;
        }
        .combo-box input {
            width: 100%;
            padding: 10px 100px 10px 22px;
            border-radius: 40px;
            border: 1.5px solid #d4af37;
            background: white;
            font-size: 1rem;
            outline: none;
            transition: 0.15s;
            height: 48px;
        }
        .combo-box input:focus {
            border-color: #b8860b;
            box-shadow: 0 0 0 3px rgba(212,175,55,0.2);
        }
        .clear-btn {
            position: absolute;
            right: 60px;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            background: #e6ded0;
            border-radius: 50%;
            color: #5f4c2e;
            font-size: 24px;
            font-weight: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: background 0.2s;
        }
        .clear-btn:hover {
            background: #d5caba;
        }
        .combo-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #d4af37;
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .combo-btn.rotate {
            transform: translateY(-50%) rotate(180deg);
        }
        .combo-btn:hover {
            background: #b8860b;
        }
        .combo-btn img {
            width: 22px;
            height: 22px;
            display: block;
            filter: brightness(0) invert(1);
        }
        .combo-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #d4af37;
            border-radius: 24px;
            max-height: 260px;
            overflow-y: auto;
            z-index: 20;
            padding: 8px 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: none;
        }
        .combo-dropdown li {
            list-style: none;
            cursor: pointer;
            color: #2c1e0e;
            transition: background 0.1s;
            font-size: 1rem;
            margin: 4px 8px;
            padding: 10px 16px;
            border-radius: 40px;
        }
        .combo-dropdown li:hover {
            background: #fcf3e1;
        }
        .combo-dropdown .selected {
            background: #d4af37;
            color: white;
            font-weight: 500;
        }
        .status {
            margin-left: auto;
            color: #8b6f3c;
            font-size: 0.9rem;
            background: #f8f0dd;
            padding: 6px 20px;
            border-radius: 40px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .settings-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #e6ded0;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            position: relative;
        }
        .settings-btn:hover {
            background: #d5caba;
            transform: rotate(15deg);
        }
        .settings-btn svg {
            width: 24px;
            height: 24px;
            fill: #5f4c2e;
        }
        .settings-panel {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 16px 20px;
            min-width: 220px;
            z-index: 30;
            border: 1px solid #d4af37;
            display: none;
        }
        .settings-panel.show {
            display: block;
        }
        .toggle-switch {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            white-space: nowrap;
        }
        .toggle-label {
            font-weight: 500;
            color: #5f4c2e;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 28px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #d4af37;
        }
        input:checked + .slider:before {
            transform: translateX(24px);
        }
        .week-control-center {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 10px 0 18px 0;
            flex-wrap: nowrap;
        }
        .week-nav-btn {
            background: #d4af37;
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 2rem;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .week-nav-btn:hover {
            background: #b8860b;
        }
        .week-display-box {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #fefaf2;
            padding: 4px 14px 4px 18px;
            border-radius: 40px;
            border: 1px solid #ecdbbd;
            white-space: nowrap;
        }
        .week-display-box span {
            font-size: 1.5rem;
            font-weight: 600;
            color: #2c1e0e;
        }
        .week-display-box input {
            width: 75px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 600;
            border: 1px solid #d4af37;
            border-radius: 30px;
            padding: 4px 0;
            color: #1e3a6f;
            background: white;
            outline: none;
        }
        .week-display-box input:focus {
            border-color: #b8860b;
            box-shadow: 0 0 0 3px rgba(212,175,55,0.25);
        }
        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            margin: 10px 0 0;
            border-radius: 20px;
            border: 1px solid #eeddc5;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            min-width: 720px;
        }
        th {
            background: #fcf3e1;
            color: #4f3a1e;
            font-weight: 600;
            font-size: 1rem;
            padding: 14px 4px;
            border: 1px solid #eed2b1;
        }
        td {
            border: 1px solid #eed2b1;
            vertical-align: top;
            padding: 8px;
            height: 140px;
            background-color: #fffdf8;
        }
        .time-col {
            background: #fcf3e1;
            font-weight: 600;
            color: #4f3a1e;
            width: 80px;
            text-align: center;
            vertical-align: middle;
            font-size: 1rem;
            border-right: 2px solid #d4af37;
        }
        .course-item {
            background: #fffdf5;
            border: 1px solid #f5efd9;
            border-radius: 14px;
            padding: 12px 10px;
            margin-bottom: 8px;
            transition: transform 0.15s, box-shadow 0.15s, background 0.1s;
            cursor: default;
        }
        .course-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            background: #fffaf0;
        }
        .course-item.selected {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            background: #fff0db;
            border-color: #d4af37;
        }
        .query-enabled .course-item {
            cursor: pointer;
        }
        .course-item:active {
            transform: translateY(1px);
        }
        .course-item:last-child {
            margin-bottom: 0;
        }
        .course-name {
            font-weight: 700;
            color: #2c1e0e;
            font-size: 1rem;
            margin-bottom: 8px;
            border-bottom: 1px dashed #e9d7b5;
            padding-bottom: 4px;
        }
        .course-detail {
            color: #5f4c2e;
            font-size: 0.88rem;
            line-height: 1.6;
            padding-left: 6px;
            display: flex;
            align-items: baseline;
            gap: 5px;
        }
        .course-detail::before {
            content: "•";
            color: #b8860b;
            font-weight: bold;
            font-size: 1.2rem;
            margin-right: 4px;
        }
        .empty-cell {
            color: #ccb690;
            font-style: italic;
            text-align: center;
            padding-top: 24px;
            font-size: 0.9rem;
        }
        .floating-card {
            position: absolute;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            padding: 16px 20px;
            min-width: 260px;
            z-index: 1000;
            border: 1px solid #d4af37;
            backdrop-filter: blur(2px);
            animation: fadeIn 0.1s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
        .floating-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: #2c1e0e;
            border-left: 3px solid #d4af37;
            padding-left: 10px;
        }
        .query-student-btn {
            background: #d4af37;
            color: white;
            border: none;
            padding: 8px 12px;
            width: 100%;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            margin: 10px 0;
            cursor: pointer;
            transition: background 0.2s;
        }
        .query-student-btn:hover {
            background: #b8860b;
        }
        .same-class-info {
            background: #fefaf2;
            padding: 10px;
            border-radius: 16px;
            font-size: 0.85rem;
            color: #5f4c2e;
            word-break: break-word;
        }
        @media (max-width: 768px) {
            .settings-btn {
                display: none;
            }
        }
        @media (max-width: 600px) {
            .toolbar { padding: 12px; border-radius: 28px; }
            .combo-box input { padding-right: 90px; font-size: 0.95rem; height: 46px; }
            .clear-btn { right: 54px; width: 28px; height: 28px; font-size: 22px; }
            .combo-btn { width: 34px; height: 34px; right: 6px; }
            .combo-btn img { width: 20px; height: 20px; }
            .status { margin-left: 0; width: 100%; text-align: center; white-space: normal; }
            .week-nav-btn { width: 38px; height: 38px; font-size: 1.8rem; }
            .week-display-box { padding: 2px 10px 2px 14px; }
            .week-display-box span { font-size: 1.3rem; }
            .week-display-box input { width: 65px; font-size: 1.3rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="toolbar">
        <div class="combo-box" id="classComboContainer">
            <input type="text" id="classComboInput" placeholder="班级" autocomplete="off" value="">
            <div class="clear-btn" id="clearInputBtn">×</div>
            <button class="combo-btn" id="comboToggleBtn">
                <img src="Expand.svg" alt="expand">
            </button>
            <ul class="combo-dropdown" id="comboDropdown"></ul>
        </div>
        <div class="status" id="status">正在加载数据...</div>
        <div style="position: relative;">
            <button class="settings-btn" id="settingsBtn">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-2,0-3.6-1.6-3.6-3.6 s1.6-3.6,3.6-3.6s3.6,1.6,3.6,3.6S14,15.6,12,15.6z"/>
                </svg>
            </button>
            <div id="settingsPanel" class="settings-panel">
                <div class="toggle-switch">
                    <span class="toggle-label">启用课程点击查询</span>
                    <label class="switch">
                        <input type="checkbox" id="queryToggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>
    <div class="week-control-center">
        <button class="week-nav-btn" id="prevWeekBtn">←</button>
        <div class="week-display-box">
            <span>第</span>
            <input type="text" id="weekDisplayInput" value="3" inputmode="numeric" pattern="\d*">
            <span>周</span>
        </div>
        <button class="week-nav-btn" id="nextWeekBtn">→</button>
    </div>
    <div class="table-wrapper">
        <table id="timetable">
            <thead>
            <tr id="weekHeaders">
                <th>节次 / 星期</th>
                <th>周一</th>
                <th>周二</th>
                <th>周三</th>
                <th>周四</th>
                <th>周五</th>
                <th>周六</th>
                <th>周日</th>
              </tr>
            </thead>
            <tbody id="timetableBody">
                <tr><td colspan="8" style="text-align:center; padding:40px;">⏳ 加载数据...</td></tr>
            </tbody>
        </table>
    </div>
    <footer></footer>
</div>
<script>
    (function() {
        let coursesData = [];
        let scheduleData = [];
        let courseNameMap = new Map();
        let allClasses = [];
        let selectedClass = '';
        let lessonToClasses = new Map();

        const statusDiv = document.getElementById('status');
        const weekDisplayInput = document.getElementById('weekDisplayInput');
        const prevWeekBtn = document.getElementById('prevWeekBtn');
        const nextWeekBtn = document.getElementById('nextWeekBtn');
        const tbody = document.getElementById('timetableBody');
        const comboInput = document.getElementById('classComboInput');
        const comboBtn = document.getElementById('comboToggleBtn');
        const comboDropdown = document.getElementById('comboDropdown');
        const clearBtn = document.getElementById('clearInputBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsPanel = document.getElementById('settingsPanel');
        const queryToggle = document.getElementById('queryToggle');

        const SESSIONS = [
            { name: "1-2", start: 1, end: 2, time: "8:00 - 9:40" },
            { name: "3-4", start: 3, end: 4, time: "10:00 - 11:40" },
            { name: "5-6", start: 5, end: 6, time: "14:00 - 15:40" },
            { name: "7-8", start: 7, end: 8, time: "16:00 - 17:40" },
            { name: "10-11", start: 10, end: 11, time: "19:20 - 21:00" }
        ];
        const WEEKDAYS = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];

        let enableQuery = false;
        let currentFloatingCard = null;

        function updateStatus(msg, isError = false) {
            statusDiv.textContent = msg;
            statusDiv.style.background = isError ? '#ffe6d5' : '#f8f0dd';
            statusDiv.style.color = isError ? '#a1451a' : '#8b6f3c';
        }

        function extractClasses() {
            const classSet = new Set();
            coursesData.forEach(item => {
                if (item.class && typeof item.class === 'string') {
                    const cls = item.class.trim();
                    if (cls) classSet.add(cls);
                }
            });
            return Array.from(classSet).sort((a,b) => a.localeCompare(b, 'zh'));
        }

        function buildMaps() {
            courseNameMap.clear();
            lessonToClasses.clear();
            coursesData.forEach(item => {
                if (item.lessonid && item.name) {
                    courseNameMap.set(String(item.lessonid), item.name);
                }
                if (item.lessonid && item.class) {
                    const lid = String(item.lessonid);
                    const cls = item.class.trim();
                    if (!lessonToClasses.has(lid)) lessonToClasses.set(lid, new Set());
                    lessonToClasses.get(lid).add(cls);
                }
            });
        }

        function isValidForWeek(scheduleItem, weekNum) {
            if (!scheduleItem.vaildWeeks) return false;
            const weeksStr = String(scheduleItem.vaildWeeks);
            if (weeksStr.length < weekNum) return false;
            return weeksStr.charAt(weekNum - 1) === '1';
        }

        function coversSessionBlock(schedule, blockStart, blockEnd) {
            const s = schedule.startSession;
            const e = schedule.endSession;
            return !(e < blockStart || s > blockEnd);
        }

        function buildTimetableData(className, weekNum) {
            const grid = Array.from({ length: 7 }, () => Array.from({ length: SESSIONS.length }, () => []));
            const courseIdsInClass = new Set();
            coursesData.forEach(c => {
                if (c.class && c.class.trim() === className && c.lessonid) {
                    courseIdsInClass.add(String(c.lessonid));
                }
            });
            scheduleData.forEach((sch) => {
                const courseId = String(sch.courseId);
                if (!courseIdsInClass.has(courseId)) return;
                if (!isValidForWeek(sch, weekNum)) return;
                const weekday = sch.weekday;
                if (weekday < 1 || weekday > 7) return;
                const courseName = courseNameMap.get(courseId) || '未知课程';
                const teacher = sch.teacherName || '';
                const room = sch.roomName || '';
                const courseInfo = { name: courseName, teacher, room, lessonId: courseId };
                for (let sIdx = 0; sIdx < SESSIONS.length; sIdx++) {
                    const block = SESSIONS[sIdx];
                    if (coversSessionBlock(sch, block.start, block.end)) {
                        grid[weekday-1][sIdx].push(courseInfo);
                    }
                }
            });
            return grid;
        }

        function clearSelectedCards() {
            document.querySelectorAll('.course-item').forEach(card => card.classList.remove('selected'));
        }

        function closeFloatingCard() {
            if (currentFloatingCard) {
                currentFloatingCard.remove();
                currentFloatingCard = null;
            }
        }

        function showFloatingCard(cardElement, lessonId, courseName) {
            closeFloatingCard();
            if (!selectedClass) return;

            let allClassesForLesson = [];
            if (lessonToClasses.has(lessonId)) {
                allClassesForLesson = Array.from(lessonToClasses.get(lessonId)).sort((a, b) => a.localeCompare(b, 'zh'));
            }
            const classText = allClassesForLesson.length ? `该课程班级: ${allClassesForLesson.join('、')}` : '该课程班级: 无';

            const rect = cardElement.getBoundingClientRect();
            const scrollTop = window.scrollY || document.documentElement.scrollTop;
            const scrollLeft = window.scrollX || document.documentElement.scrollLeft;

            const div = document.createElement('div');
            div.className = 'floating-card';
            div.innerHTML = `
                <div class="floating-title">${escapeHtml(courseName)}</div>
                <button class="query-student-btn">查询该班学生</button>
                <div class="same-class-info">${escapeHtml(classText)}</div>
            `;
            document.body.appendChild(div);
            currentFloatingCard = div;

            let left = rect.right + 8 + scrollLeft;
            let top = rect.top + scrollTop;
            const cardWidth = div.offsetWidth;
            const cardHeight = div.offsetHeight;
            if (left + cardWidth > window.innerWidth + scrollLeft) {
                left = rect.left - cardWidth - 8 + scrollLeft;
            }
            if (top + cardHeight > window.innerHeight + scrollTop) {
                top = rect.bottom - cardHeight + scrollTop;
            }
            div.style.left = left + 'px';
            div.style.top = top + 'px';

            const queryBtn = div.querySelector('.query-student-btn');
            queryBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                // 修改跳转：使用根路径 /student_search.html，确保从子目录正确跳转
                window.location.href = `/student_search.html?s=${encodeURIComponent(selectedClass)}`;
            });
            div.addEventListener('click', (e) => e.stopPropagation());
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function renderTimetable(className, weekNum) {
            if (!className || allClasses.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:40px;">请选择一个班级</td></tr>';
                return;
            }
            const grid = buildTimetableData(className, weekNum);
            const baseDate = new Date(2026, 2, 2);
            const monday = new Date(baseDate);
            monday.setDate(baseDate.getDate() + (weekNum - 1) * 7);
            const dates = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date(monday);
                d.setDate(monday.getDate() + i);
                const month = (d.getMonth()+1).toString().padStart(2,'0');
                const day = d.getDate().toString().padStart(2,'0');
                dates.push(`${month}.${day}`);
            }
            const headers = document.querySelectorAll('#weekHeaders th');
            for (let i = 1; i <= 7; i++) {
                if (headers[i]) {
                    headers[i].innerHTML = `${WEEKDAYS[i-1]}<br><span style="font-size:0.75rem; font-weight:normal; color:#7c613a;">${dates[i-1]}</span>`;
                }
            }
            let html = '';
            for (let row = 0; row < SESSIONS.length; row++) {
                const session = SESSIONS[row];
                html += '<tr>';
                html += `<td class="time-col">${session.name}<br><span style="font-size:0.75rem;">${session.time}</span></td>`;
                for (let day = 0; day < 7; day++) {
                    const courses = grid[day][row];
                    html += '<td>';
                    if (courses.length === 0) {
                        html += '<div class="empty-cell">—</div>';
                    } else {
                        courses.forEach(c => {
                            let details = '';
                            if (c.room) details += `<div class="course-detail">教室：${c.room}</div>`;
                            if (c.teacher) details += `<div class="course-detail">教师：${c.teacher}</div>`;
                            if (!c.room && !c.teacher) details += `<div class="course-detail">无教室/教师信息</div>`;
                            html += `<div class="course-item" data-lessonid="${c.lessonId}" data-coursename="${escapeHtml(c.name)}">`;
                            html += `<div class="course-name">${escapeHtml(c.name)}</div>`;
                            html += details;
                            html += `</div>`;
                        });
                    }
                    html += '</td>';
                }
                html += '</tr>';
            }
            tbody.innerHTML = html;
            attachCourseEvents();
        }

        function attachCourseEvents() {
            const container = document.querySelector('.table-wrapper');
            if (!container) return;
            if (enableQuery) {
                container.classList.add('query-enabled');
            } else {
                container.classList.remove('query-enabled');
            }
            const cards = document.querySelectorAll('.course-item');
            cards.forEach(card => {
                const newCard = card.cloneNode(true);
                card.parentNode.replaceChild(newCard, card);
                const lessonId = newCard.dataset.lessonid;
                const courseName = newCard.dataset.coursename;
                if (!lessonId) return;
                if (enableQuery) {
                    newCard.addEventListener('click', (e) => {
                        e.stopPropagation();
                        showFloatingCard(newCard, lessonId, courseName);
                    });
                } else {
                    newCard.addEventListener('click', (e) => {
                        e.stopPropagation();
                        closeFloatingCard();
                        if (newCard.classList.contains('selected')) {
                            newCard.classList.remove('selected');
                        } else {
                            clearSelectedCards();
                            newCard.classList.add('selected');
                        }
                    });
                }
            });
        }

        function refreshTimetable() {
            let weekNum = parseInt(weekDisplayInput.value, 10);
            if (isNaN(weekNum) || weekNum < 1) weekNum = 1;
            if (weekNum > 26) weekNum = 26;
            weekDisplayInput.value = weekNum;
            renderTimetable(selectedClass, weekNum);
        }

        function renderDropdown(filterText = '') {
            if (!allClasses.length) {
                comboDropdown.innerHTML = '<li style="color:#999;">无班级数据</li>';
                return;
            }
            const lowerFilter = filterText.toLowerCase();
            const filtered = allClasses.filter(cls => cls.toLowerCase().includes(lowerFilter));
            if (filtered.length === 0) {
                comboDropdown.innerHTML = '<li style="color:#999;">无匹配班级</li>';
                return;
            }
            let html = '';
            filtered.forEach(cls => {
                const selectedClassAttr = (cls === selectedClass) ? 'selected' : '';
                html += `<li class="${selectedClassAttr}" data-class="${cls}">${escapeHtml(cls)}</li>`;
            });
            comboDropdown.innerHTML = html;
            Array.from(comboDropdown.querySelectorAll('li[data-class]')).forEach(li => {
                li.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const cls = li.dataset.class;
                    if (cls) {
                        selectedClass = cls;
                        comboInput.value = cls;
                        toggleClearBtn();
                        hideDropdown();
                        refreshTimetable();
                    }
                });
            });
        }
        function showDropdown() {
            if (!allClasses.length) return;
            renderDropdown(comboInput.value);
            comboDropdown.style.display = 'block';
            comboBtn.classList.add('rotate');
        }
        function hideDropdown() {
            comboDropdown.style.display = 'none';
            comboBtn.classList.remove('rotate');
        }
        function toggleDropdown() {
            if (comboDropdown.style.display === 'block') hideDropdown();
            else showDropdown();
        }
        function toggleClearBtn() {
            clearBtn.style.display = comboInput.value.length > 0 ? 'flex' : 'none';
        }
        clearBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            comboInput.value = '';
            toggleClearBtn();
            if (comboDropdown.style.display === 'block') renderDropdown('');
            comboInput.focus();
        });
        comboInput.addEventListener('input', function() {
            toggleClearBtn();
            if (!allClasses.length) return;
            if (comboDropdown.style.display === 'block') renderDropdown(this.value);
            else showDropdown();
        });
        comboInput.addEventListener('focus', () => { if (allClasses.length && comboDropdown.style.display !== 'block') showDropdown(); });
        comboBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleDropdown(); });
        document.addEventListener('click', (e) => {
            if (!document.getElementById('classComboContainer').contains(e.target)) hideDropdown();
        });
        comboDropdown.addEventListener('click', (e) => e.stopPropagation());

        function closeSettingsPanel() {
            settingsPanel.classList.remove('show');
        }
        function toggleSettingsPanel() {
            settingsPanel.classList.toggle('show');
        }
        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleSettingsPanel();
        });
        document.addEventListener('click', (e) => {
            if (!settingsBtn.contains(e.target) && !settingsPanel.contains(e.target)) {
                closeSettingsPanel();
            }
        });
        queryToggle.addEventListener('change', (e) => {
            enableQuery = e.target.checked;
            if (selectedClass) refreshTimetable();
            else attachCourseEvents();
        });

        weekDisplayInput.addEventListener('input', function(e) { this.value = this.value.replace(/[^\d]/g, ''); });
        weekDisplayInput.addEventListener('blur', function() {
            let val = parseInt(this.value, 10);
            if (isNaN(val) || val < 1) val = 1;
            if (val > 26) val = 26;
            this.value = val;
            refreshTimetable();
        });
        weekDisplayInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') weekDisplayInput.blur(); });
        function changeWeek(delta) {
            let current = parseInt(weekDisplayInput.value, 10);
            if (isNaN(current)) current = 1;
            let newWeek = current + delta;
            if (newWeek < 1) newWeek = 1;
            if (newWeek > 26) newWeek = 26;
            weekDisplayInput.value = newWeek;
            refreshTimetable();
        }
        prevWeekBtn.addEventListener('click', () => changeWeek(-1));
        nextWeekBtn.addEventListener('click', () => changeWeek(1));

        document.addEventListener('click', (e) => {
            if (currentFloatingCard && !currentFloatingCard.contains(e.target) && !e.target.closest('.course-item')) {
                closeFloatingCard();
            }
            if (!enableQuery && !e.target.closest('.course-item')) {
                clearSelectedCards();
            }
        });

        function initCombo() {
            if (allClasses.length > 0) {
                selectedClass = '';
                comboInput.value = '';
                toggleClearBtn();
                renderDropdown('');
                refreshTimetable();
            } else {
                comboInput.value = '';
                selectedClass = '';
                toggleClearBtn();
                comboDropdown.innerHTML = '<li style="color:#999;">无班级</li>';
                refreshTimetable();
            }
        }

        async function loadAllFiles() {
            updateStatus('正在加载课程信息...');
            try {
                const [coursesResp, scheduleResp] = await Promise.all([
                    fetch('lessons.json'),
                    fetch('schedules.json')
                ]);
                if (!coursesResp.ok) throw new Error(`课程文件加载失败: ${coursesResp.status}`);
                if (!scheduleResp.ok) throw new Error(`排课文件加载失败: ${scheduleResp.status}`);
                const coursesJson = await coursesResp.json();
                const scheduleJson = await scheduleResp.json();
                coursesData = Array.isArray(coursesJson) ? coursesJson : [];
                if (coursesData.length === 0) throw new Error('课程信息为空数组');
                scheduleData = Array.isArray(scheduleJson) ? scheduleJson : [];
                if (scheduleData.length === 0) throw new Error('排课信息为空数组');
                buildMaps();
                updateStatus('数据更新时间:2026.3.20');
                allClasses = extractClasses();
                initCombo();
            } catch (err) {
                updateStatus(`❌ 加载失败: ${err.message}`, true);
                console.error(err);
                comboInput.value = '加载失败';
                comboInput.disabled = true;
                comboBtn.disabled = true;
                clearBtn.style.display = 'none';
                comboDropdown.innerHTML = '';
            }
        }

        const initHeaders = document.querySelectorAll('#weekHeaders th');
        for (let i = 1; i <= 7; i++) if (initHeaders[i]) initHeaders[i].innerHTML = WEEKDAYS[i-1];
        loadAllFiles();
    })();
</script>
</body>
</html>
