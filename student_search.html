<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生信息查询系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f9f9f9;
            padding: 20px;
            overflow-x: hidden;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            min-width: 300px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #d4af37;
        }
        .header h1 {
            color: #333;
            font-size: clamp(20px, 5vw, 28px);
        }
        /* 胶囊形搜索容器 */
        .search-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 40px;
            position: relative;
            max-width: 600px;
        }
        .search-input {
            width: 100%;
            padding: 14px 22px;
            padding-right: 100px;
            border: 2px solid #d4af37;
            border-radius: 50px;
            font-size: 16px;
            outline: none;
            transition: all 0.2s ease;
        }
        .search-input:focus {
            box-shadow: 0 0 8px rgba(212,175,55,0.4);
            border-color: #d4af37;
        }
        /* 金色胶囊搜索按钮 */
        .search-btn {
            position: absolute;
            right: 4px;
            height: calc(100% - 8px);
            width: 90px;
            background: #d4af37;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .search-btn:hover {
            background: #b8860b;
        }
        /* 结果展示区域 */
        .result-container {
            display: none;
            margin-top: 20px;
        }
        .result-title {
            color: #d4af37;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
        }
        /* 多结果容器-单人一大框 */
        .result-list {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-bottom: 30px;
        }
        /* 单人信息大框 */
        .student-card {
            background: #fffdf5;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #f5efd9;
            width: 100%;
        }
        /* 信息项网格 */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px 15px;
            align-items: center;
        }
        /* 单个信息白色小框 */
        .info-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 12px 15px;
            background: #ffffff;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        .info-label {
            color: #666;
            font-size: 14px;
            font-weight: 500;
        }
        .info-value {
            color: #333;
            font-size: 17px;
            word-break: break-all;
        }
        /* 分页样式 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }
        .page-btn {
            padding: 8px 20px;
            background: #d4af37;
            color: #fff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s ease;
        }
        .page-btn:disabled {
            background: #e6e6e6;
            color: #999;
            cursor: not-allowed;
        }
        .page-btn:hover:not(:disabled) {
            background: #b8860b;
        }
        .page-info {
            color: #666;
            font-size: 16px;
        }
        /* 提示信息 */
        .tip-message {
            text-align: center;
            padding: 30px 0;
            font-size: 16px;
            display: none;
        }
        .tip-error {
            color: #f44336;
        }
        .tip-empty {
            color: #999;
        }
        /* 移动端适配 */
        @media (max-width: 768px) {
            .info-grid {
                grid-template-columns: 1fr 1fr;
            }
            .search-container {
                max-width: 95%;
            }
            .student-card {
                padding: 20px;
            }
            .page-btn {
                padding: 6px 15px;
                font-size: 14px;
            }
        }
        @media (max-width: 480px) {
            .info-grid {
                grid-template-columns: 1fr;
            }
            .pagination {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>学生信息查询系统</h1>
        </div>

        <!-- 胶囊搜索框+文字搜索按钮 -->
        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="请输入查询关键词（姓名/学号/班级/学院等）">
            <button class="search-btn" id="searchBtn">搜索</button>
        </div>

        <!-- 提示信息 -->
        <div class="tip-message tip-error" id="errorMsg">请输入有效的查询关键词</div>
        <div class="tip-message tip-empty" id="emptyMsg">未找到匹配的学生信息，请更换关键词重试</div>

        <!-- 结果展示：分页+单人一大框+白色小框 -->
        <div class="result-container" id="resultContainer">
            <div class="result-title" id="resultCount">查询结果（共<span id="totalNum">0</span>条）</div>
            <div class="result-list" id="resultList"></div>
            <!-- 分页控件 -->
            <div class="pagination" id="pagination">
                <button class="page-btn" id="prevPage" disabled>上一页</button>
                <div class="page-info" id="pageInfo">第<span id="currentPage">1</span>页 / 共<span id="totalPage">1</span>页</div>
                <button class="page-btn" id="nextPage" disabled>下一页</button>
            </div>
        </div>
    </div>

    <script>
        // DOM元素获取
        const el = {
            searchInput: document.getElementById('searchInput'),
            searchBtn: document.getElementById('searchBtn'),
            resultContainer: document.getElementById('resultContainer'),
            resultList: document.getElementById('resultList'),
            totalNum: document.getElementById('totalNum'),
            currentPage: document.getElementById('currentPage'),
            totalPage: document.getElementById('totalPage'),
            prevPage: document.getElementById('prevPage'),
            nextPage: document.getElementById('nextPage'),
            pageInfo: document.getElementById('pageInfo'),
            errorMsg: document.getElementById('errorMsg'),
            emptyMsg: document.getElementById('emptyMsg')
        };

        // 全局变量：分页配置+搜索结果缓存
        let studentData = []; // 原始JSON数据
        let searchResult = []; // 搜索匹配的结果缓存
        const PAGE_SIZE = 10; // 每页展示10条，可自定义
        let currentPageNum = 1; // 当前页码
        const JSON_FILE_NAME = 'studentInfo.json';

        // 初始化：读取本地JSON文件
        function init() {
            fetch(JSON_FILE_NAME)
                .then(res => {
                    if (!res.ok) throw new Error('文件加载失败');
                    return res.json();
                })
                .then(data => {
                    studentData = Array.isArray(data) ? data : [data];
                    console.log(`本地JSON加载成功，共${studentData.length}条学生信息`);
                })
                .catch(err => {
                    el.errorMsg.textContent = `本地JSON文件加载失败：请检查${JSON_FILE_NAME}是否与HTML同目录`;
                    el.errorMsg.style.display = 'block';
                    // 本地跨域备用方案：注释上方fetch，取消下方注释粘贴JSON
                    // studentData = [
                    //     {"adminclass_name":"临床22-11","code":"2022306117","depart_name":"医学院","direction_name":"","gender":"女","major_name":"临床医学","name":"左倩"},
                    //     {"adminclass_name":"临床22-12","code":"2022306118","depart_name":"医学院","direction_name":"心血管","gender":"男","major_name":"临床医学","name":"张三"}
                    // ];
                });
        }

        // 重置所有显示状态（搜索/翻页时调用）
        function resetDisplay() {
            el.resultContainer.style.display = 'none';
            el.errorMsg.style.display = 'none';
            el.emptyMsg.style.display = 'none';
            el.resultList.innerHTML = '';
            currentPageNum = 1; // 每次搜索重置为第1页
            updatePaginationBtn(); // 重置分页按钮状态
        }

        // 搜索逻辑：模糊匹配+缓存结果+渲染第一页
        function searchStudent() {
            resetDisplay();
            const keyword = el.searchInput.value.trim().toLowerCase();
            if (!keyword) {
                el.errorMsg.style.display = 'block';
                return;
            }

            // 模糊匹配所有字段，缓存结果到searchResult
            searchResult = studentData.filter(student => {
                return Object.values(student).some(val => {
                    return String(val).toLowerCase().includes(keyword);
                });
            });

            // 无匹配结果
            if (searchResult.length === 0) {
                el.emptyMsg.style.display = 'block';
                return;
            }

            // 更新总条数和总页数
            el.totalNum.textContent = searchResult.length;
            el.totalPage.textContent = Math.ceil(searchResult.length / PAGE_SIZE);
            // 渲染当前页（第1页）
            renderCurrentPage();
            el.resultContainer.style.display = 'block';
            updatePaginationBtn(); // 更新分页按钮状态
        }

        // 渲染当前页数据：截取对应分页的10条数据
        function renderCurrentPage() {
            // 计算截取起始和结束索引
            const startIndex = (currentPageNum - 1) * PAGE_SIZE;
            const endIndex = startIndex + PAGE_SIZE;
            const currentData = searchResult.slice(startIndex, endIndex);

            // 固定信息显示顺序：班级、学号、姓名、性别、学院、专业、专业方向
            const infoMap = [
                { label: '班级', key: 'adminclass_name' },
                { label: '学号', key: 'code' },
                { label: '姓名', key: 'name' },
                { label: '性别', key: 'gender' },
                { label: '学院', key: 'depart_name' },
                { label: '专业', key: 'major_name' },
                { label: '专业方向', key: 'direction_name' }
            ];

            // 渲染当前页的每条数据
            currentData.forEach(student => {
                let infoHtml = '';
                infoMap.forEach(item => {
                    const value = student[item.key] || '无';
                    infoHtml += `
                        <div class="info-item">
                            <span class="info-label">${item.label}</span>
                            <span class="info-value">${value}</span>
                        </div>
                    `;
                });
                // 单人一个大框，内部包含白色小框
                const cardHtml = `
                    <div class="student-card">
                        <div class="info-grid">${infoHtml}</div>
                    </div>
                `;
                el.resultList.innerHTML += cardHtml;
            });

            // 更新当前页码显示
            el.currentPage.textContent = currentPageNum;
        }

        // 更新分页按钮禁用/启用状态
        function updatePaginationBtn() {
            const totalPageNum = Math.ceil(searchResult.length / PAGE_SIZE);
            // 上一页：第1页时禁用
            el.prevPage.disabled = currentPageNum === 1;
            // 下一页：最后一页时禁用
            el.nextPage.disabled = currentPageNum === totalPageNum;
        }

        // 上一页逻辑
        function toPrevPage() {
            if (currentPageNum > 1) {
                currentPageNum--;
                el.resultList.innerHTML = ''; // 清空当前页
                renderCurrentPage();
                updatePaginationBtn();
            }
        }

        // 下一页逻辑
        function toNextPage() {
            const totalPageNum = Math.ceil(searchResult.length / PAGE_SIZE);
            if (currentPageNum < totalPageNum) {
                currentPageNum++;
                el.resultList.innerHTML = ''; // 清空当前页
                renderCurrentPage();
                updatePaginationBtn();
            }
        }

        // 事件绑定
        // 搜索按钮+回车搜索
        el.searchBtn.addEventListener('click', searchStudent);
        el.searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchStudent();
        });
        // 分页按钮
        el.prevPage.addEventListener('click', toPrevPage);
        el.nextPage.addEventListener('click', toNextPage);

        // 页面加载初始化
        window.onload = init;
    </script>
</body>
</html>
