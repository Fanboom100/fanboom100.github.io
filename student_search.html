<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生信息查询系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f9f9f9;
            padding: 20px;
            overflow-x: hidden;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            min-width: 300px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #d4af37; /* 还原原金色主题色 */
        }
        .header h1 {
            color: #333;
            font-size: clamp(20px, 5vw, 28px);
        }
        /* 胶囊形搜索容器 - 按钮嵌入右侧 */
        .search-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 40px;
            position: relative;
            max-width: 600px;
        }
        .search-input {
            width: 100%;
            padding: 14px 22px;
            padding-right: 100px;
            border: 2px solid #d4af37; /* 还原金色 */
            border-radius: 50px;
            font-size: 16px;
            outline: none;
            transition: all 0.2s ease;
        }
        .search-input:focus {
            box-shadow: 0 0 8px rgba(212,175,55,0.4);
            border-color: #d4af37;
        }
        /* 胶囊形文字搜索按钮 - 还原金色 */
        .search-btn {
            position: absolute;
            right: 4px;
            height: calc(100% - 8px);
            width: 90px;
            background: #d4af37;
            color: #fff; /* 白色文字更醒目 */
            font-size: 16px;
            font-weight: 500;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .search-btn:hover {
            background: #b8860b; /* 金色加深hover */
        }
        /* 结果展示区域 */
        .result-container {
            display: none;
            margin-top: 20px;
        }
        .result-title {
            color: #d4af37;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
        }
        /* 多结果容器 - 垂直分隔，单人一个大框 */
        .result-list {
            display: flex;
            flex-direction: column;
            gap: 25px; /* 大框之间的间距，分隔更明显 */
        }
        /* 单人信息独立大圆角框 - 核心样式 */
        .student-card {
            background: #fffdf5;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #f5efd9;
            width: 100%;
        }
        /* 信息项排版 - 横向自适应，紧凑美观 */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px 15px;
            align-items: center;
        }
        .info-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .info-label {
            color: #666;
            font-size: 14px;
            font-weight: 500;
        }
        .info-value {
            color: #333;
            font-size: 17px;
            word-break: break-all;
        }
        /* 提示信息 */
        .tip-message {
            text-align: center;
            padding: 30px 0;
            font-size: 16px;
            display: none;
        }
        .tip-error {
            color: #f44336;
        }
        .tip-empty {
            color: #999;
        }
        /* 移动端适配 */
        @media (max-width: 768px) {
            .info-grid {
                grid-template-columns: 1fr 1fr;
            }
            .search-container {
                max-width: 95%;
            }
            .student-card {
                padding: 20px;
            }
        }
        @media (max-width: 480px) {
            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>学生信息查询系统</h1>
        </div>

        <!-- 胶囊形搜索框+金色文字搜索按钮 -->
        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="请输入查询关键词（姓名/学号/班级/学院等）">
            <button class="search-btn" id="searchBtn">搜索</button>
        </div>

        <!-- 提示信息 -->
        <div class="tip-message tip-error" id="errorMsg">请输入有效的查询关键词</div>
        <div class="tip-message tip-empty" id="emptyMsg">未找到匹配的学生信息，请更换关键词重试</div>

        <!-- 多结果展示：单人一个大框 -->
        <div class="result-container" id="resultContainer">
            <div class="result-title" id="resultCount">查询结果（共<span id="countNum">0</span>条）</div>
            <div class="result-list" id="resultList">
                <!-- 动态生成：单人一个student-card大框 -->
            </div>
        </div>
    </div>

    <script>
        // DOM元素获取
        const el = {
            searchInput: document.getElementById('searchInput'),
            searchBtn: document.getElementById('searchBtn'),
            resultContainer: document.getElementById('resultContainer'),
            resultList: document.getElementById('resultList'),
            countNum: document.getElementById('countNum'),
            errorMsg: document.getElementById('errorMsg'),
            emptyMsg: document.getElementById('emptyMsg')
        };

        // 学生数据
        let studentData = [];
        const JSON_FILE_NAME = 'studentInfo.json';

        // 初始化读取本地JSON
        function init() {
            fetch(JSON_FILE_NAME)
                .then(res => {
                    if (!res.ok) throw new Error('文件加载失败');
                    return res.json();
                })
                .then(data => {
                    studentData = Array.isArray(data) ? data : [data];
                    console.log(`本地JSON加载成功，共${studentData.length}条学生信息`);
                })
                .catch(err => {
                    el.errorMsg.textContent = `本地JSON文件加载失败：请检查${JSON_FILE_NAME}是否与HTML同目录`;
                    el.errorMsg.style.display = 'block';
                    // 本地跨域备用方案：注释上方fetch，取消下方注释粘贴JSON
                    // studentData = [
                    //     {"adminclass_name":"临床22-11","code":"2022306117","depart_name":"医学院","direction_name":"","gender":"女","major_name":"临床医学","name":"左倩"},
                    //     {"adminclass_name":"临床22-12","code":"2022306118","depart_name":"医学院","direction_name":"心血管","gender":"男","major_name":"临床医学","name":"张三"}
                    // ];
                });
        }

        // 重置显示状态
        function resetDisplay() {
            el.resultContainer.style.display = 'none';
            el.errorMsg.style.display = 'none';
            el.emptyMsg.style.display = 'none';
            el.resultList.innerHTML = '';
        }

        // 多结果模糊搜索逻辑
        function searchStudent() {
            resetDisplay();
            const keyword = el.searchInput.value.trim().toLowerCase();
            if (!keyword) {
                el.errorMsg.style.display = 'block';
                return;
            }
            // 匹配所有字段
            const matchStudents = studentData.filter(student => {
                return Object.values(student).some(val => {
                    return String(val).toLowerCase().includes(keyword);
                });
            });
            if (matchStudents.length === 0) {
                el.emptyMsg.style.display = 'block';
                return;
            }
            // 渲染结果
            renderStudentCards(matchStudents);
            el.resultContainer.style.display = 'block';
            el.countNum.textContent = matchStudents.length;
        }

        // 渲染单人一个大框，严格按指定顺序：班级、学号、姓名、性别、学院、专业、专业方向
        function renderStudentCards(students) {
            // 固定信息显示顺序（核心修改）
            const infoMap = [
                { label: '班级', key: 'adminclass_name' },
                { label: '学号', key: 'code' },
                { label: '姓名', key: 'name' },
                { label: '性别', key: 'gender' },
                { label: '学院', key: 'depart_name' },
                { label: '专业', key: 'major_name' },
                { label: '专业方向', key: 'direction_name' }
            ];

            students.forEach(student => {
                // 生成单条信息项
                let infoHtml = '';
                infoMap.forEach(item => {
                    const value = student[item.key] || '无';
                    infoHtml += `
                        <div class="info-item">
                            <span class="info-label">${item.label}</span>
                            <span class="info-value">${value}</span>
                        </div>
                    `;
                });
                // 单人一个大圆角框，拼接到结果容器
                const cardHtml = `
                    <div class="student-card">
                        <div class="info-grid">${infoHtml}</div>
                    </div>
                `;
                el.resultList.innerHTML += cardHtml;
            });
        }

        // 事件绑定
        el.searchBtn.addEventListener('click', searchStudent);
        el.searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchStudent();
        });

        // 页面加载初始化
        window.onload = init;
    </script>
</body>
</html>
