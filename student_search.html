<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生信息查询系统 - 支持链接参数搜索</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f9f9f9;
            padding: 20px;
            overflow-x: hidden;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            min-width: 300px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #d4af37;
        }
        .header h1 {
            color: #333;
            font-size: clamp(20px, 5vw, 28px);
        }
        .update-time {
            color: #666;
            font-size: clamp(12px, 3vw, 15px);
            margin-top: 8px;
            margin-bottom: 0px;
        }
        .search-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 40px;
            position: relative;
            max-width: 600px;
        }
        .search-input {
            width: 100%;
            padding: 14px 22px;
            padding-right: 100px;
            border: 2px solid #d4af37;
            border-radius: 50px;
            font-size: 16px;
            outline: none;
            transition: all 0.2s ease;
        }
        .search-input:focus {
            box-shadow: 0 0 8px rgba(212,175,55,0.4);
            border-color: #d4af37;
        }
        .search-btn {
            position: absolute;
            right: 4px;
            height: calc(100% - 8px);
            width: 90px;
            background: #d4af37;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .search-btn:hover {
            background: #b8860b;
        }
        .result-container {
            display: none;
            margin-top: 20px;
        }
        .result-title {
            color: #d4af37;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
        }
        .result-list {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-bottom: 30px;
        }
        .student-card {
            background: #fffdf5;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #f5efd9;
            width: 100%;
            position: relative;
        }
        .student-index {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 24px;
            height: 24px;
            background-color: #b8860b;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            z-index: 1;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px 15px;
            align-items: center;
            padding-left: 40px;
        }
        .info-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .info-label {
            color: #666;
            font-size: 14px;
            font-weight: 500;
        }
        .info-value {
            color: #333;
            font-size: 17px;
            word-break: break-all;
        }
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }
        .page-btn {
            padding: 8px 20px;
            background: #d4af37;
            color: #fff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s ease;
        }
        .page-btn:disabled {
            background: #e6e6e6;
            color: #999;
            cursor: not-allowed;
        }
        .page-btn:hover:not(:disabled) {
            background: #b8860b;
        }
        .page-info {
            color: #666;
            font-size: 16px;
        }
        .tip-message {
            text-align: center;
            padding: 30px 0;
            font-size: 16px;
            display: none;
        }
        .tip-error {
            color: #f44336;
        }
        .tip-empty {
            color: #999;
        }
        .tip-loading {
            color: #d4af37;
        }
        @media (max-width: 768px) {
            .info-grid {
                grid-template-columns: 1fr 1fr;
                padding-left: 40px;
            }
            .search-container {
                max-width: 95%;
            }
            .student-card {
                padding: 20px;
            }
            .page-btn {
                padding: 6px 15px;
                font-size: 14px;
            }
        }
        @media (max-width: 480px) {
            .info-grid {
                grid-template-columns: 1fr;
                padding-left: 40px;
            }
            .pagination {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>学生信息查询系统</h1>
            <p class="update-time">数据更新时间：2026.3.16 23:10</p>
        </div>
        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="输入关键词查询 (支持学号/姓名/班级等)">
            <button class="search-btn" id="searchBtn">搜索</button>
        </div>
        <!-- 提示信息区域 -->
        <div class="tip-message tip-error" id="errorMsg">请输入有效的查询关键词</div>
        <div class="tip-message tip-empty" id="emptyMsg">未找到匹配的学生信息，请更换关键词重试</div>
        <div class="tip-message tip-loading" id="loadingMsg">数据加载中，请稍后...</div>
        <!-- 结果展示区域 -->
        <div class="result-container" id="resultContainer">
            <div class="result-title" id="resultCount">查询结果（共<span id="totalNum">0</span>条）</div>
            <div class="result-list" id="resultList"></div>
            <div class="pagination" id="pagination">
                <button class="page-btn" id="prevPage" disabled>上一页</button>
                <div class="page-info" id="pageInfo">第<span id="currentPage">1</span>页 / 共<span id="totalPage">1</span>页</div>
                <button class="page-btn" id="nextPage" disabled>下一页</button>
            </div>
        </div>
    </div>
    <script>
        // DOM 元素获取
        const el = {
            searchInput: document.getElementById('searchInput'),
            searchBtn: document.getElementById('searchBtn'),
            resultContainer: document.getElementById('resultContainer'),
            resultList: document.getElementById('resultList'),
            totalNum: document.getElementById('totalNum'),
            currentPage: document.getElementById('currentPage'),
            totalPage: document.getElementById('totalPage'),
            prevPage: document.getElementById('prevPage'),
            nextPage: document.getElementById('nextPage'),
            pageInfo: document.getElementById('pageInfo'),
            errorMsg: document.getElementById('errorMsg'),
            emptyMsg: document.getElementById('emptyMsg'),
            loadingMsg: document.getElementById('loadingMsg')
        };
        
        // 全局变量
        let studentData = [];           // 原始学生数据
        let searchResult = [];          // 当前搜索结果缓存
        let currentPageNum = 1;         // 当前页码
        let isDataLoaded = false;        // 数据是否加载完成标志
        let loadFailed = false;           // 数据加载是否失败
        
        const PAGE_SIZE = 10;            // 每页显示数量
        const JSON_FILE_NAME = 'studentInfo.json';
        
        // ---------- 工具函数 ----------
        // 获取 URL 参数 (支持 ?s=xxx 或 &s=xxx)
        function getUrlParameter(name) {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                return urlParams.get(name);
            } catch (e) {
                // 降级方案：手动正则
                const match = window.location.search.match(new RegExp('[?&]' + name + '=([^&]+)'));
                return match ? decodeURIComponent(match[1].replace(/\+/g, ' ')) : null;
            }
        }
        
        // 隐藏所有提示消息
        function hideAllTips() {
            el.errorMsg.style.display = 'none';
            el.emptyMsg.style.display = 'none';
            el.loadingMsg.style.display = 'none';
        }
        
        // 显示加载中状态 (仅在没有结果展示时显示)
        function showLoadingTip(show = true) {
            if (show) {
                hideAllTips();
                el.loadingMsg.style.display = 'block';
            } else {
                el.loadingMsg.style.display = 'none';
            }
        }
        
        // 重置整个UI（清空结果、隐藏容器、重置分页）
        function resetDisplay() {
            el.resultContainer.style.display = 'none';
            el.resultList.innerHTML = '';
            currentPageNum = 1;
            hideAllTips();
        }
        
        // 更新分页按钮状态
        function updatePaginationBtn() {
            const totalPageNum = Math.ceil(searchResult.length / PAGE_SIZE);
            el.prevPage.disabled = (currentPageNum === 1);
            el.nextPage.disabled = (currentPageNum === totalPageNum || totalPageNum === 0);
        }
        
        // 渲染当前页数据 (基于 searchResult 和 currentPageNum)
        function renderCurrentPage() {
            if (!searchResult.length) return;
            
            const startIndex = (currentPageNum - 1) * PAGE_SIZE;
            const endIndex = startIndex + PAGE_SIZE;
            const currentData = searchResult.slice(startIndex, endIndex);
            
            // 固定展示顺序 (专业方向已移除)
            const infoMap = [
                { label: '班级', key: 'adminclass_name' },
                { label: '学号', key: 'code' },
                { label: '姓名', key: 'name' },
                { label: '性别', key: 'gender' },
                { label: '学院', key: 'depart_name' },
                { label: '专业', key: 'major_name' }
            ];
            
            let htmlBuffer = '';
            currentData.forEach((student, idx) => {
                // 全局序号（从1开始连续）
                const globalIndex = (currentPageNum - 1) * PAGE_SIZE + idx + 1;
                let infoHtml = '';
                infoMap.forEach(item => {
                    const value = student[item.key] !== undefined && student[item.key] !== null ? student[item.key] : '无';
                    infoHtml += `
                        <div class="info-item">
                            <span class="info-label">${item.label}</span>
                            <span class="info-value">${escapeHtml(value)}</span>
                        </div>
                    `;
                });
                htmlBuffer += `
                    <div class="student-card">
                        <div class="student-index">${globalIndex}</div>
                        <div class="info-grid">${infoHtml}</div>
                    </div>
                `;
            });
            el.resultList.innerHTML = htmlBuffer;
            el.currentPage.textContent = currentPageNum;
            el.totalPage.textContent = Math.ceil(searchResult.length / PAGE_SIZE);
        }
        
        // 简单防XSS
        function escapeHtml(str) {
            if (!str) return '无';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }
        
        // 核心搜索逻辑 (基于全局 studentData 和输入框关键词)
        function performSearch() {
            // 1. 数据未就绪检测
            if (!isDataLoaded) {
                hideAllTips();
                if (loadFailed) {
                    el.errorMsg.textContent = '学生数据加载失败，请刷新页面重试或检查 studentInfo.json 文件。';
                    el.errorMsg.style.display = 'block';
                } else {
                    el.errorMsg.textContent = '数据仍在加载中，请稍后再试...';
                    el.errorMsg.style.display = 'block';
                }
                el.resultContainer.style.display = 'none';
                return;
            }
            
            const keyword = el.searchInput.value.trim();
            if (!keyword) {
                // 空关键词提示
                hideAllTips();
                el.errorMsg.textContent = '请输入有效的查询关键词';
                el.errorMsg.style.display = 'block';
                el.resultContainer.style.display = 'none';
                return;
            }
            
            // 模糊匹配所有字段 (不区分大小写)
            const lowerKeyword = keyword.toLowerCase();
            const filtered = studentData.filter(student => {
                return Object.values(student).some(val => {
                    if (val === undefined || val === null) return false;
                    return String(val).toLowerCase().includes(lowerKeyword);
                });
            });
            
            searchResult = filtered;
            
            // 无匹配结果
            if (searchResult.length === 0) {
                resetDisplay();
                hideAllTips();
                el.emptyMsg.style.display = 'block';
                return;
            }
            
            // 有结果: 重置分页
            currentPageNum = 1;
            el.totalNum.textContent = searchResult.length;
            el.totalPage.textContent = Math.ceil(searchResult.length / PAGE_SIZE);
            
            // 渲染第一页
            renderCurrentPage();
            updatePaginationBtn();
            
            // 显示结果容器
            el.resultContainer.style.display = 'block';
            hideAllTips(); // 确保提示隐藏
        }
        
        // 封装搜索（供手动和自动调用）
        function searchAndRender() {
            performSearch();
        }
        
        // 分页控制
        function goPrevPage() {
            if (currentPageNum > 1) {
                currentPageNum--;
                renderCurrentPage();
                updatePaginationBtn();
                // 滚动到顶部让用户看到新内容
                document.querySelector('.result-container')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }
        
        function goNextPage() {
            const total = Math.ceil(searchResult.length / PAGE_SIZE);
            if (currentPageNum < total) {
                currentPageNum++;
                renderCurrentPage();
                updatePaginationBtn();
                document.querySelector('.result-container')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }
        
        // 从 URL 参数自动填充并搜索 (仅当数据加载完成后调用)
        function autoSearchFromUrl() {
            if (!isDataLoaded) return false;
            
            const sValue = getUrlParameter('s');
            if (sValue && sValue.trim() !== '') {
                const decodedValue = decodeURIComponent(sValue.trim());
                // 填入搜索框
                el.searchInput.value = decodedValue;
                // 执行搜索
                performSearch();
                return true;
            }
            return false;
        }
        
        // ---------- 数据初始化 ----------
        function loadStudentData() {
            // 显示加载提示
            showLoadingTip(true);
            el.resultContainer.style.display = 'none';
            hideAllTips();
            el.loadingMsg.style.display = 'block';
            
            fetch(JSON_FILE_NAME)
                .then(res => {
                    if (!res.ok) {
                        throw new Error(`HTTP ${res.status}: 无法加载 ${JSON_FILE_NAME}`);
                    }
                    return res.json();
                })
                .then(data => {
                    studentData = Array.isArray(data) ? data : (data ? [data] : []);
                    console.log(`✅ 本地JSON加载成功，共 ${studentData.length} 条学生信息`);
                    isDataLoaded = true;
                    loadFailed = false;
                    showLoadingTip(false);
                    
                    // 数据加载完成后，检查是否需要自动搜索（URL参数 s=xxx）
                    const hasAutoSearch = autoSearchFromUrl();
                    if (!hasAutoSearch) {
                        // 没有自动搜索参数，保持初始状态：不显示结果，不报错
                        hideAllTips();
                        // 可选：提示输入关键词（不做强制）
                    }
                })
                .catch(err => {
                    console.error('❌ 加载学生数据失败:', err);
                    isDataLoaded = false;
                    loadFailed = true;
                    showLoadingTip(false);
                    // 显示详细错误信息，友好提示
                    el.errorMsg.textContent = `本地JSON文件加载失败：请确保 ${JSON_FILE_NAME} 与HTML文件在同一目录，且格式正确。\n详细信息：${err.message}`;
                    el.errorMsg.style.display = 'block';
                    el.resultContainer.style.display = 'none';
                    
                    // 如果加载失败但 URL 有参数，无法搜索，给出额外提示
                    const sParam = getUrlParameter('s');
                    if (sParam && sParam.trim()) {
                        // 追加提醒
                        el.errorMsg.innerHTML = `⚠️ 数据加载失败，无法完成自动搜索“${escapeHtml(sParam)}”。<br>请检查 ${JSON_FILE_NAME} 文件是否存在。`;
                    }
                });
        }
        
        // ---------- 事件绑定 ----------
        function bindEvents() {
            // 搜索按钮点击
            el.searchBtn.addEventListener('click', () => {
                if (!isDataLoaded && !loadFailed) {
                    el.errorMsg.textContent = '数据加载中，请稍后再试';
                    el.errorMsg.style.display = 'block';
                    setTimeout(() => { if (!isDataLoaded) el.errorMsg.style.display = 'none'; }, 2000);
                    return;
                }
                searchAndRender();
            });
            
            // 回车搜索
            el.searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (!isDataLoaded && !loadFailed) {
                        el.errorMsg.textContent = '数据加载中，请稍后再试';
                        el.errorMsg.style.display = 'block';
                        setTimeout(() => { if (!isDataLoaded) el.errorMsg.style.display = 'none'; }, 2000);
                        return;
                    }
                    searchAndRender();
                }
            });
            
            // 分页按钮
            el.prevPage.addEventListener('click', goPrevPage);
            el.nextPage.addEventListener('click', goNextPage);
        }
        
        // 页面启动
        window.onload = () => {
            bindEvents();
            loadStudentData();  // 异步加载，加载完成自动触发 URL 参数检测
        };
    </script>
</body>
</html>
